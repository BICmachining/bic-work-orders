<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIC Work Orders — Parts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --bg2: #171b24;
    --bg3: #1e2433;
    --border: #2a3045;
    --border2: #3a4460;
    --text: #e8ecf4;
    --text2: #8b95b0;
    --text3: #556080;
    --accent: #4a9eff;
    --accent2: #2d7de0;
    --green: #2ecc71;
    --yellow: #f39c12;
    --red: #e74c3c;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body.light {
    --bg: #f4f5f7;
    --bg2: #ffffff;
    --bg3: #ebedf2;
    --border: #d0d4df;
    --border2: #b0b8cc;
    --text: #1a1d27;
    --text2: #4a5068;
    --text3: #8090b0;
    --accent: #1a6fd4;
    --accent2: #1458b0;
    --green: #1a9e50;
    --yellow: #c47d08;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo-wrap { display: flex; align-items: center; }
  .header-logo { height: 36px; width: auto; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .hdr-btn {
    font-family: var(--mono);
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .hdr-btn:hover { color: var(--text); border-color: var(--accent); }

  .hdr-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .hdr-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  /* MAIN LAYOUT */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* SEARCH BAR */
  .search-section { margin-bottom: 24px; }

  .search-box-wrap {
    position: relative;
    max-width: 600px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-box {
    font-family: var(--sans);
    font-size: 15px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 13px 16px 13px 42px;
    border-radius: 8px;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .search-box:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,158,255,0.12);
  }

  .search-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
  }

  /* INDEX VIEW */
  #view-index { display: block; }
  #view-detail { display: none; }

  .results-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* RESULT TABS */
  .result-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tab-btn {
    font-family: var(--mono);
    font-size: 11px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn:hover { border-color: var(--border2); color: var(--text); }
  .tab-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08); }

  /* PART CARDS (index) */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .result-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .result-card:hover { border-color: var(--accent); transform: translateY(-1px); }

  .rc-pn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .rc-desc {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .rc-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .rc-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .rc-meta-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .rc-meta-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  /* MATERIAL CARDS (index) */
  .material-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border2);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .material-card:hover { border-color: var(--accent); border-left-color: var(--accent); transform: translateY(-1px); }

  .mc-pn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--yellow);
    margin-bottom: 4px;
  }

  .mc-desc {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
  }

  /* EMPTY */
  .no-results {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text3);
    padding: 40px 0;
    text-align: center;
  }

  /* LOADING */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--text3);
    text-align: center;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-family: var(--mono); font-size: 13px; }

  /* DETAIL VIEW */
  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    margin-bottom: 20px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.15s;
    background: none;
  }

  .detail-back:hover { color: var(--text); border-color: var(--accent); }

  /* SUMMARY CARD */
  .summary-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }

  .summary-pn {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .summary-desc {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .summary-stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .summary-stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
  }

  .summary-stat-value {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .summary-stat-value.accent { color: var(--accent); }
  .summary-stat-value.green { color: var(--green); }

  /* MATERIAL SECTION IN DETAIL */
  .material-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--yellow);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }

  .material-section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .material-pn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .material-desc {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .material-avg {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
  }

  /* HISTORY TABLE */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 32px;
  }

  .hist-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }

  .hist-table thead tr { background: var(--bg3); border-bottom: 1px solid var(--border2); }

  .hist-table thead th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }

  .hist-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .hist-table tbody tr:last-child { border-bottom: none; }
  .hist-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .hist-table tbody td { padding: 10px 12px; vertical-align: middle; }

  .po-link {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }

  .po-link:hover { text-decoration: underline; }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    display: inline-block;
  }

  .status-pill.complete { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
  .status-pill.in-process { background: rgba(74,158,255,0.12); color: var(--accent); border: 1px solid rgba(74,158,255,0.3); }
  .status-pill.waiting { background: rgba(243,156,18,0.12); color: var(--yellow); border: 1px solid rgba(243,156,18,0.3); }
  .status-pill.not-started { background: rgba(85,96,128,0.15); color: var(--text3); border: 1px solid rgba(85,96,128,0.3); }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .main { padding: 16px; }
    .results-grid { grid-template-columns: 1fr; }
    .summary-stats { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Tools section in part detail ── */
  .tools-section { margin-top: 12px; }
  .tools-section-sep { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 0 10px; border-top: 1px solid var(--border); margin-top: 4px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .tools-section-sep-btns { display: flex; gap: 8px; }
  .ts-btn { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; transition: all 0.12s; display: inline-flex; align-items: center; gap: 4px; }
  .ts-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-link-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; transition: border-color 0.12s; }
  .tool-link-item:hover { border-color: var(--accent); }
  .tli-id { font-family: var(--mono); font-size: 11px; color: var(--accent); white-space: nowrap; }
  .tli-desc { font-size: 13px; flex: 1; }
  .tli-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
  .tli-remove { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border2); color: var(--text3); background: transparent; cursor: pointer; transition: all 0.12s; }
  .tli-remove:hover { border-color: var(--red); color: var(--red); }
  .inline-search-panel { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; margin-top: 8px; display: none; }
  .inline-search-panel input { width: 100%; font-family: var(--mono); font-size: 12px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 4px; margin-bottom: 8px; }
  .inline-search-panel input:focus { outline: none; border-color: var(--accent); }
  .inline-results-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .inline-result-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--bg2); border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.12s; }
  .inline-result-row:hover { border-color: var(--accent); }
  .ir-id { font-family: var(--mono); font-size: 11px; color: var(--accent); }
  .ir-desc { font-size: 12px; flex: 1; }
  .ir-vendor { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  /* Setup sheet import */
  .setup-import-panel { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 14px; margin-top: 8px; display: none; }
  .setup-import-panel label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  .setup-import-panel input[type=file] { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; width: 100%; cursor: pointer; margin-bottom: 10px; }
  .confirm-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
  .confirm-table th { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border2); }
  .confirm-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .match-ok { font-family: var(--mono); font-size: 10px; color: var(--green); }
  .match-miss { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .confirm-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .confirm-btn { font-family: var(--mono); font-size: 11px; padding: 7px 14px; border-radius: 4px; border: 1px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; transition: all 0.12s; }
  .confirm-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .confirm-btn.primary:hover { background: var(--accent2); }
  .confirm-btn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <img src="Bell_Logo.png" alt="Bell Intercoolers" class="header-logo">
  </div>
  <div class="header-right">
    <a href="dashboard.html" class="hdr-btn">&#8592; Dashboard</a>
    <a href="parts.html"     class="hdr-btn active">Parts</a>
    <a href="tools.html"     class="hdr-btn">Tools</a>
    <a href="reorder.html"   class="hdr-btn">Reorder</a>
    <a href="index.html"     class="hdr-btn primary">+ New PO</a>
  </div>
</div>

<div class="main">

  <!-- INDEX VIEW -->
  <div id="view-index">
    <div class="search-section">
      <div class="search-box-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" class="search-box" id="search-box"
          placeholder="Search part number, description, or material..."
          oninput="onSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <div class="search-hint">Search by part number, description, material part #, or material description</div>
    </div>

    <div id="index-content">
      <div class="loading-state"><div class="spinner"></div><p>Loading parts data...</p></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail">
    <button class="detail-back" onclick="showIndex()">&#8592; Back to results</button>
    <div id="detail-content"></div>
  </div>

</div>

<script>
const CONFIG_KEY = 'bic_config';
const THEME_KEY = 'bic_theme';
let allLines = [];
let allPOs = [];
let currentTab = 'parts';
let lastSearch = '';

function getConfig() {
  try { return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; }
  catch { return {}; }
}

// Apply theme immediately (before load to avoid flash)
(function() {
  const theme = localStorage.getItem(THEME_KEY) || 'dark';
  document.body.classList.toggle('light', theme === 'light');
  // Pre-seed script URL if not set
  const DEFAULT_SCRIPT = 'https://script.google.com/macros/s/AKfycbwPhuL9gsYgewRQCRcbyguqw3ogJUOXniqi9C_voFQZQlK_76LNXWyBLgkcCCs-yk3Feg/exec';
  try {
    const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {};
    if (!cfg.script) { cfg.script = DEFAULT_SCRIPT; localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }
  } catch(e) {}
})();

window.addEventListener('load', () => {
  loadData();
  loadToolingData();
});

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
  const cfg = getConfig();
  if (!cfg.script) {
    document.getElementById('index-content').innerHTML =
      '<div class="no-results">Apps Script URL not configured. <a href="dashboard.html" style="color:var(--accent)">Go to Dashboard → Settings</a></div>';
    return;
  }

  try {
    const url = cfg.script + '?action=getDashboardData&t=' + Date.now();
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error);

    allLines = data.lineItems || [];
    allPOs = data.pos || [];

    renderIndex('');
  } catch (err) {
    document.getElementById('index-content').innerHTML =
      `<div class="no-results">Failed to load: ${err.message}</div>`;
  }
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch() {
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  lastSearch = q;
  renderIndex(q);
}

// ── INDEX RENDER ──────────────────────────────────────────────────────────────
function renderIndex(q) {
  const container = document.getElementById('index-content');

  if (currentTab === 'parts') {
    renderPartsIndex(q, container);
  } else {
    renderMaterialsIndex(q, container);
  }
}

function buildTabsHTML(activeTab) {
  return `<div class="result-tabs">
    <button class="tab-btn ${activeTab==='parts'?'active':''}" onclick="switchTab('parts')">
      Machined Parts
    </button>
    <button class="tab-btn ${activeTab==='materials'?'active':''}" onclick="switchTab('materials')">
      Raw Materials
    </button>
  </div>`;
}

function switchTab(tab) {
  currentTab = tab;
  renderIndex(lastSearch);
}

function renderPartsIndex(q, container) {
  // Unique parts (by part number)
  const partMap = {};
  allLines.forEach(l => {
    if (!l.partNumber) return;
    const key = String(l.partNumber).trim();
    if (!key) return;
    if (!partMap[key]) {
      partMap[key] = {
        partNumber: key,
        descriptions: new Set(),
        runs: [],
        totalQty: 0
      };
    }
    if (l.description) partMap[key].descriptions.add(l.description);
    partMap[key].runs.push(l);
    partMap[key].totalQty += parseFloat(l.qty) || 0;
  });

  let parts = Object.values(partMap);

  if (q) {
    parts = parts.filter(p =>
      p.partNumber.toLowerCase().includes(q) ||
      [...p.descriptions].some(d => d.toLowerCase().includes(q))
    );
  }

  parts.sort((a, b) => a.partNumber.localeCompare(b.partNumber));

  const tabsHTML = buildTabsHTML('parts');

  if (parts.length === 0) {
    container.innerHTML = tabsHTML + `<div class="no-results">${q ? 'No parts matching "' + esc(q) + '"' : 'No parts data yet'}</div>`;
    return;
  }

  const label = q
    ? `<div class="results-label">${parts.length} part${parts.length!==1?'s':''} matching "${esc(q)}"</div>`
    : `<div class="results-label">${parts.length} unique part${parts.length!==1?'s':''}</div>`;

  const cards = parts.map(p => {
    const desc = [...p.descriptions][0] || '';
    const lastRun = p.runs.slice().sort((a,b) => b.dueDate > a.dueDate ? 1 : -1)[0];
    const lastDate = lastRun ? (lastRun.statusUpdated ? lastRun.statusUpdated.split(' ')[0] : lastRun.dueDate) : '—';
    const completedRuns = p.runs.filter(r => (r.status||'').toLowerCase() === 'complete');

    return `<div class="result-card" onclick="showPartDetail('${esc(p.partNumber)}')">
      <div class="rc-pn">${esc(p.partNumber)}</div>
      <div class="rc-desc">${esc(desc)}</div>
      <div class="rc-meta">
        <div class="rc-meta-item">
          <span class="rc-meta-label">Total runs</span>
          <span class="rc-meta-value">${p.runs.length}</span>
        </div>
        <div class="rc-meta-item">
          <span class="rc-meta-label">Total qty</span>
          <span class="rc-meta-value">${p.totalQty}</span>
        </div>
        <div class="rc-meta-item">
          <span class="rc-meta-label">Completed</span>
          <span class="rc-meta-value">${completedRuns.length}</span>
        </div>
        <div class="rc-meta-item">
          <span class="rc-meta-label">Last date</span>
          <span class="rc-meta-value">${esc(lastDate)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = tabsHTML + label + `<div class="results-grid">${cards}</div>`;
}

function renderMaterialsIndex(q, container) {
  // Unique materials (by material part number)
  const matMap = {};
  allLines.forEach(l => {
    if (!l.materialPartNumber) return;
    const key = String(l.materialPartNumber).trim();
    if (!key) return;
    if (!matMap[key]) {
      matMap[key] = {
        materialPartNumber: key,
        descriptions: new Set(),
        parts: new Set(),
        usages: []
      };
    }
    if (l.materialDescription) matMap[key].descriptions.add(l.materialDescription);
    if (l.partNumber) matMap[key].parts.add(l.partNumber);
    if (l.materialUsed) matMap[key].usages.push(parseFloat(l.materialUsed) || 0);
  });

  let mats = Object.values(matMap);

  if (q) {
    mats = mats.filter(m =>
      m.materialPartNumber.toLowerCase().includes(q) ||
      [...m.descriptions].some(d => d.toLowerCase().includes(q))
    );
  }

  mats.sort((a, b) => a.materialPartNumber.localeCompare(b.materialPartNumber));

  const tabsHTML = buildTabsHTML('materials');

  if (mats.length === 0) {
    container.innerHTML = tabsHTML + `<div class="no-results">${q ? 'No materials matching "' + esc(q) + '"' : 'No materials data yet'}</div>`;
    return;
  }

  const label = q
    ? `<div class="results-label">${mats.length} material${mats.length!==1?'s':''} matching "${esc(q)}"</div>`
    : `<div class="results-label">${mats.length} unique material${mats.length!==1?'s':''}</div>`;

  const cards = mats.map(m => {
    const desc = [...m.descriptions][0] || '';
    const totalUsed = m.usages.reduce((a,b) => a+b, 0);

    return `<div class="material-card" onclick="showMaterialDetail('${esc(m.materialPartNumber)}')">
      <div class="mc-pn">${esc(m.materialPartNumber)}</div>
      <div class="mc-desc">${esc(desc)}</div>
      <div class="rc-meta">
        <div class="rc-meta-item">
          <span class="rc-meta-label">Parts made</span>
          <span class="rc-meta-value">${m.parts.size}</span>
        </div>
        <div class="rc-meta-item">
          <span class="rc-meta-label">Times used</span>
          <span class="rc-meta-value">${m.usages.length}</span>
        </div>
        <div class="rc-meta-item">
          <span class="rc-meta-label">Total consumed</span>
          <span class="rc-meta-value">${totalUsed > 0 ? totalUsed.toFixed(2) + '"' : '—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = tabsHTML + label + `<div class="results-grid">${cards}</div>`;
}

// ── TOOLING DATA ──────────────────────────────────────────────────────────────
const toolingState = { tools: [], inserts: [], holders: [], toolPartLinks: [], loaded: false };

async function loadToolingData() {
  const cfg = getConfig();
  if (!cfg.script) return;
  try {
    const resp = await fetch(cfg.script + '?action=getToolingData&t=' + Date.now());
    const data = await resp.json();
    if (data.success) {
      toolingState.tools         = data.tools         || [];
      toolingState.inserts       = data.inserts        || [];
      toolingState.holders       = data.holders        || [];
      toolingState.toolPartLinks = data.toolPartLinks  || [];
      toolingState.loaded        = true;
    }
  } catch(e) { /* silently fail — tools section will show empty */ }
}

async function callScript(params) {
  const cfg = getConfig();
  if (!cfg.script) throw new Error('No Apps Script URL configured.');
  const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k) + '=' + encodeURIComponent(v)).join('&');
  const resp = await fetch(cfg.script + '?' + qs);
  return resp.json();
}

function renderPartToolsSection(partNumber) {
  const links = toolingState.toolPartLinks.filter(l => String(l.partNumber).trim() === String(partNumber).trim());

  let html = `<div class="tools-section-sep">
    <span>Tools Used on This Part</span>
    <div class="tools-section-sep-btns">
      <button class="ts-btn" onclick="toggleToolLinkPanel('${esc(partNumber)}')">+ Link Tools</button>
      <button class="ts-btn" onclick="toggleSetupImportPanel('${esc(partNumber)}')">&#128196; Import Setup Sheet</button>
    </div>
  </div>`;

  if (links.length === 0) {
    html += `<div style="font-family:var(--mono);font-size:12px;color:var(--text3);padding:8px 0">No tools linked yet.</div>`;
  } else {
    links.forEach(link => {
      const tool = toolingState.tools.find(t => t.toolId === link.toolId);
      const desc  = tool ? (tool.description || tool.toolId) : link.toolId;
      const vendor = tool ? (tool.vendor || '') : '';
      html += `<div class="tool-link-item" onclick="window.location='tools.html#${esc(link.toolId)}'">
        <span class="tli-id">${esc(link.toolId)}</span>
        <span class="tli-desc">${esc(desc)}</span>
        ${vendor ? `<span class="tli-meta">${esc(vendor)}</span>` : ''}
        ${link.fusionTNum ? `<span class="tli-meta">${esc(link.fusionTNum)}</span>` : ''}
        <button class="tli-remove" onclick="event.stopPropagation();removeToolLink('${esc(link.linkId)}','${esc(partNumber)}')">✕</button>
      </div>`;
    });
  }

  // Link tools panel
  html += `<div class="inline-search-panel" id="tool-link-panel-${esc(partNumber)}">
    <input type="search" placeholder="Search tool ID, description, product #..." autocomplete="off"
      oninput="searchToolsForPart(this.value,'${esc(partNumber)}')">
    <div class="inline-results-list" id="tool-link-results-${esc(partNumber)}"></div>
  </div>`;

  // Setup sheet import panel
  html += `<div class="setup-import-panel" id="setup-import-panel-${esc(partNumber)}">
    <label>Select Fusion Setup Sheet (.html)</label>
    <input type="file" accept=".html,.htm" id="setup-file-${esc(partNumber)}">
    <div id="setup-confirm-${esc(partNumber)}"></div>
  </div>`;

  return html;
}

function toggleToolLinkPanel(partNumber) {
  const el = document.getElementById('tool-link-panel-' + partNumber);
  if (!el) return;
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  if (!open) {
    const inp = el.querySelector('input');
    if (inp) { inp.value = ''; inp.focus(); }
    searchToolsForPart('', partNumber);
  }
}

function searchToolsForPart(query, partNumber) {
  const container = document.getElementById('tool-link-results-' + partNumber);
  if (!container) return;
  const q = (query || '').toLowerCase().trim();
  const items = q
    ? toolingState.tools.filter(t =>
        String(t.toolId).toLowerCase().includes(q) ||
        String(t.description).toLowerCase().includes(q) ||
        String(t.productNumber).toLowerCase().includes(q) ||
        String(t.vendor).toLowerCase().includes(q)
      )
    : toolingState.tools.slice(0, 20);

  container.innerHTML = items.map(t => `
    <div class="inline-result-row" onclick="addToolPartLink('${esc(t.toolId)}','${esc(partNumber)}')">
      <span class="ir-id">${esc(t.toolId)}</span>
      <span class="ir-desc">${esc(t.description || '—')}</span>
      <span class="ir-vendor">${esc(t.vendor || '')}</span>
    </div>`).join('') || `<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:8px">No tools found.</div>`;
}

async function addToolPartLink(toolId, partNumber) {
  try {
    const r = await callScript({ action: 'addToolPartLink', toolId, partNumber, fusionTNum: '', source: 'manual' });
    if (r.success) {
      toolingState.toolPartLinks.push({ linkId: r.linkId, partNumber, toolId, fusionTNum: '', source: 'manual', fusionFile: '', notes: '' });
      refreshToolsSection(partNumber);
    } else {
      alert(r.error || 'Failed to link tool.');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

async function removeToolLink(linkId, partNumber) {
  if (!confirm('Remove this tool link?')) return;
  try {
    const r = await callScript({ action: 'removeToolPartLink', linkId });
    if (r.success) {
      const idx = toolingState.toolPartLinks.findIndex(l => l.linkId === linkId);
      if (idx >= 0) toolingState.toolPartLinks.splice(idx, 1);
      refreshToolsSection(partNumber);
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function refreshToolsSection(partNumber) {
  const sec = document.getElementById('tools-section-' + partNumber);
  if (!sec) return;
  sec.innerHTML = renderPartToolsSection(partNumber);
  setTimeout(() => attachSetupFileListener(partNumber), 0);
}

// ── SETUP SHEET IMPORT ────────────────────────────────────────────────────────
function toggleSetupImportPanel(partNumber) {
  const el = document.getElementById('setup-import-panel-' + partNumber);
  if (!el) return;
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function attachSetupFileListener(partNumber) {
  const input = document.getElementById('setup-file-' + partNumber);
  if (!input) return;
  input.addEventListener('change', async function() {
    const file = this.files[0];
    if (!file) return;
    const text = await file.text();
    const tools = parseSetupSheet(text);
    renderSetupConfirm(tools, file.name, partNumber);
  });
}

function parseSetupSheet(htmlContent) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlContent, 'text/html');
  const text = doc.body ? doc.body.innerText : htmlContent;

  const toolPattern = /T(\d+)\s+D[\d.]+\s+L[\d.]+\s+Type:\s*(.*?)\s+Diameter:\s*([\d.]+)in.*?Description:\s*(.*?)(?:\s+Vendor:\s*(.*?))?(?:\s+Product:\s*(.*?))?(?=T\d+\s+D[\d.]|$)/gs;

  const tools = [];
  const seen = new Set();
  let match;

  while ((match = toolPattern.exec(text)) !== null) {
    const tNum = match[1];
    if (seen.has(tNum)) continue;
    seen.add(tNum);
    tools.push({
      fusionTNumber: 'T' + tNum,
      type:          (match[2] || '').trim(),
      diameter:      (match[3] || '').trim(),
      description:   (match[4] || '').trim(),
      vendor:        (match[5] || '').trim(),
      productId:     (match[6] || '').trim()
    });
  }

  // Fallback: scan for T## patterns in table rows
  if (tools.length === 0) {
    const rows = doc.querySelectorAll('tr');
    rows.forEach(row => {
      const cells = [...row.querySelectorAll('td,th')].map(c => c.innerText.trim());
      if (cells.length >= 2 && /^T\d+$/.test(cells[0])) {
        const tNum = cells[0].replace('T','');
        if (!seen.has(tNum)) {
          seen.add(tNum);
          tools.push({
            fusionTNumber: 'T' + tNum,
            type:          cells[1] || '',
            diameter:      cells[2] || '',
            description:   cells[3] || cells[1] || '',
            vendor:        cells[4] || '',
            productId:     cells[5] || ''
          });
        }
      }
    });
  }

  return tools;
}

function matchTool(parsed) {
  // Try product ID match first, then description fuzzy match
  if (parsed.productId) {
    const byPN = toolingState.tools.find(t =>
      String(t.productNumber).toLowerCase() === parsed.productId.toLowerCase()
    );
    if (byPN) return { tool: byPN, confidence: 'Product # match' };
  }
  if (parsed.description) {
    const desc = parsed.description.toLowerCase();
    const byDesc = toolingState.tools.find(t =>
      t.description && t.description.toLowerCase().includes(desc.slice(0, 12))
    );
    if (byDesc) return { tool: byDesc, confidence: 'Description match' };
  }
  return null;
}

function renderSetupConfirm(parsedTools, filename, partNumber) {
  const container = document.getElementById('setup-confirm-' + partNumber);
  if (!container) return;

  if (parsedTools.length === 0) {
    container.innerHTML = `<div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding:8px 0">No tools found in this file. Expected Fusion 360 setup sheet format.</div>`;
    return;
  }

  const rows = parsedTools.map((parsed, idx) => {
    const match = matchTool(parsed);
    const checkedAttr = match ? 'checked' : '';
    const matchCell = match
      ? `<span class="match-ok">✓ ${esc(match.confidence)}<br><small>${esc(match.tool.toolId)} — ${esc(match.tool.description)}</small></span>`
      : `<span class="match-miss">✗ Not found in system</span>`;

    return `<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--accent)">${esc(parsed.fusionTNumber)}</td>
      <td>${esc(parsed.description || parsed.type)}</td>
      <td>${matchCell}</td>
      <td style="text-align:center"><input type="checkbox" data-idx="${idx}" ${checkedAttr} ${match?'':'disabled'}></td>
    </tr>`;
  });

  const tableHTML = `
    <table class="confirm-table">
      <thead>
        <tr>
          <th>Fusion T#</th>
          <th>Description</th>
          <th>Match</th>
          <th style="text-align:center">Include?</th>
        </tr>
      </thead>
      <tbody>${rows.join('')}</tbody>
    </table>
    <div class="confirm-btns">
      <button class="confirm-btn primary" onclick="confirmSetupImport('${esc(partNumber)}','${esc(filename)}')">&#10003; Import Checked</button>
      <button class="confirm-btn" onclick="document.getElementById('setup-confirm-${esc(partNumber)}').innerHTML=''">Cancel</button>
    </div>`;

  container.innerHTML = tableHTML;
  // Store parsed tools on container for access during confirm
  container._parsedTools = parsedTools;
}

async function confirmSetupImport(partNumber, filename) {
  const container = document.getElementById('setup-confirm-' + partNumber);
  if (!container || !container._parsedTools) return;
  const parsedTools = container._parsedTools;

  const checkboxes = container.querySelectorAll('input[type=checkbox]:checked');
  const toImport = [];
  checkboxes.forEach(cb => {
    const idx = parseInt(cb.dataset.idx);
    const parsed = parsedTools[idx];
    const match = matchTool(parsed);
    if (match) {
      toImport.push({ tool: match.tool, fusionTNum: parsed.fusionTNumber });
    }
  });

  if (toImport.length === 0) { alert('No tools selected.'); return; }

  let ok = 0;
  for (const item of toImport) {
    try {
      const r = await callScript({
        action: 'addToolPartLink',
        toolId: item.tool.toolId,
        partNumber,
        fusionTNum: item.fusionTNum,
        source: 'setup sheet',
        fusionFile: filename
      });
      if (r.success) {
        ok++;
        toolingState.toolPartLinks.push({
          linkId: r.linkId, partNumber,
          toolId: item.tool.toolId,
          fusionTNum: item.fusionTNum,
          source: 'setup sheet',
          fusionFile: filename,
          notes: ''
        });
      }
    } catch(e) { /* skip */ }
  }

  alert(`Imported ${ok} tool link${ok !== 1 ? 's' : ''} from setup sheet.`);
  refreshToolsSection(partNumber);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function statusClass(status) {
  const s = (status || '').toLowerCase();
  if (s === 'not started') return 'not-started';
  if (s === 'waiting on material') return 'waiting';
  if (s === 'in process') return 'in-process';
  if (s === 'complete') return 'complete';
  return 'not-started';
}

function esc(val) {
  if (val === null || val === undefined) return '';
  return String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
